<header data-bs-theme="dark">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm" aria-label="Tenth navbar example">
        <div class="container">

            <a style="cursor: pointer;" (click)="navegar('inicio')" class="navbar-brand d-flex align-items-center">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none"
                    class="bi bi-journal-bookmark-fill me-2" viewBox="0 0 16 16">
                    <path fill-rule="evenodd" d="M6 1h6v7a.5.5 0 0 1-.757.429L9 7.083 6.757 8.43A.5.5 0 0 1 6 8z" />
                    <path
                        d="M3 0h10a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2v-1h1v1a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1V2a1 1 0 0 0-1-1H3a1 1 0 0 0-1 1v1H1V2a2 2 0 0 1 2-2" />
                    <path
                        d="M1 5v-.5a.5.5 0 0 1 1 0V5h.5a.5.5 0 0 1 0 1h-2a.5.5 0 0 1 0-1zm0 3v-.5a.5.5 0 0 1 1 0V8h.5a.5.5 0 0 1 0 1h-2a.5.5 0 0 1 0-1zm0 3v-.5a.5.5 0 0 1 1 0v.5h.5a.5.5 0 0 1 0 1h-2a.5.5 0 0 1 0-1z" />
                </svg>
                <strong>Dashboard</strong>
            </a>

            <button class="navbar-toggler" type="button" (click)="toggleMenu()" aria-controls="navbarsExample08"
                [attr.aria-expanded]="isMenuOpen" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse justify-content-md-center" [class.show]="isMenuOpen"
                id="navbarsExample08">
                <ul class="navbar-nav">

                    <li class="nav-item">
                        <a class="nav-link" (click)="navegar('inicio')" style="cursor: pointer;">Inicio</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" (click)="navegar('tareas')" style="cursor: pointer;">Mis Tareas</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" (click)="navegar('auditoria')" style="cursor: pointer;">Auditoría</a>
                    </li>

                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" (click)="toggleDropdown($event)"
                            aria-expanded="false">
                            Mi Perfil
                        </a>
                        <ul class="dropdown-menu" [class.show]="isDropdownOpen">
                            <li><a class="dropdown-item" (click)="navegar('configuracion')"
                                    style="cursor: pointer;">Configuración</a></li>
                            <li>
                                <hr class="dropdown-divider">
                            </li>
                            <li><a class="dropdown-item text-danger" style="cursor: pointer;"
                                    (click)="onLogout()">Cerrar sesión</a></li>
                        </ul>
                    </li>

                </ul>
            </div>

        </div>
    </nav>
</header>
