<mat-card class="monochrome-task-card mt-4">
    <mat-card-header class="task-header-mono"
        style="display: flex; justify-content: space-between; align-items: center;">
        <mat-card-title>Gestión de Cuentas</mat-card-title>

        <mat-form-field appearance="outline" class="monochrome-field" style="margin-bottom: -1.25em;">
            <mat-label>Búsqueda rápida...</mat-label>
            <input matInput (keyup)="applyFilter($event)" placeholder="Nombre de usuario">
            <mat-icon matSuffix>search</mat-icon>
        </mat-form-field>
    </mat-card-header>

    <mat-card-content>
        <div class="table-responsive-mono mt-3">
            <table mat-table [dataSource]="dataSource" class="monochrome-table">

                <ng-container matColumnDef="id">
                    <th mat-header-cell *matHeaderCellDef> ID </th>
                    <td mat-cell *matCellDef="let user"> {{user.id}} </td>
                </ng-container>

                <ng-container matColumnDef="username">
                    <th mat-header-cell *matHeaderCellDef> Usuario </th>
                    <td mat-cell *matCellDef="let user"> <strong>{{user.username}}</strong> </td>
                </ng-container>

                <ng-container matColumnDef="name">
                    <th mat-header-cell *matHeaderCellDef> Nombre </th>
                    <td mat-cell *matCellDef="let user"> {{user.name}} {{user.lastname}} </td>
                </ng-container>

                <ng-container matColumnDef="role">
                    <th mat-header-cell *matHeaderCellDef> Rol </th>
                    <td mat-cell *matCellDef="let user">
                        <span class="mono-chip" [class.mono-chip-high]="user.role === 'ADMIN'">{{user.role}}</span>
                    </td>
                </ng-container>

                <ng-container matColumnDef="actions">
                    <th mat-header-cell *matHeaderCellDef class="text-center"> Seguridad </th>
                    <td mat-cell *matCellDef="let user" class="text-center">
                        <button mat-stroked-button color="warn" (click)="promptResetPassword(user)">
                            <mat-icon>lock_reset</mat-icon> Reset Password
                        </button>
                    </td>
                </ng-container>

                <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
            </table>

            <mat-paginator class="monochrome-paginator" [pageSizeOptions]="[5, 10, 25]" aria-label="Seleccionar página"
                showFirstLastButtons></mat-paginator>
        </div>
    </mat-card-content>
</mat-card>
