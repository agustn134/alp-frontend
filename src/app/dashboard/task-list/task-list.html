<mat-card class="task-card">
    <mat-card-header class="card-header">
        <mat-card-title>Mis Tareas</mat-card-title>
        <button mat-flat-button color="primary" (click)="openCreateTask()">
            <mat-icon>add</mat-icon> Nueva Tarea
        </button>
    </mat-card-header>

    <mat-card-content>
        @if (tasks.length > 0) {
        <div class="table-responsive">
            <table mat-table [dataSource]="tasks" class="mat-elevation-z2 mt-3">

                <ng-container matColumnDef="id">
                    <th mat-header-cell *matHeaderCellDef> No. </th>
                    <td mat-cell *matCellDef="let element"> {{element.id}} </td>
                </ng-container>

                <ng-container matColumnDef="name">
                    <th mat-header-cell *matHeaderCellDef> Nombre </th>
                    <td mat-cell *matCellDef="let element"> <strong>{{element.name}}</strong> </td>
                </ng-container>

                <ng-container matColumnDef="description">
                    <th mat-header-cell *matHeaderCellDef> Descripción </th>
                    <td mat-cell *matCellDef="let element"> {{element.description}} </td>
                </ng-container>

                <ng-container matColumnDef="priority">
                    <th mat-header-cell *matHeaderCellDef> Prioridad </th>
                    <td mat-cell *matCellDef="let element">
                        <mat-chip [color]="element.priority ? 'warn' : 'accent'" highlighted>
                            {{element.priority ? 'Alta' : 'Normal'}}
                        </mat-chip>
                    </td>
                </ng-container>

                <ng-container matColumnDef="actions">
                    <th mat-header-cell *matHeaderCellDef class="text-center"> Acciones </th>
                    <td mat-cell *matCellDef="let element" class="text-center">
                        <button mat-icon-button color="primary" (click)="openEditTask(element)">
                            <mat-icon>edit</mat-icon>
                        </button>
                        <button mat-icon-button color="warn" (click)="deleteTask(element.id)">
                            <mat-icon>delete</mat-icon>
                        </button>
                    </td>
                </ng-container>

                <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
            </table>
        </div>
        } @else {
        <div class="empty-state mt-3">
            <mat-icon>assignment</mat-icon>
            <p>No tienes tareas registradas. ¡Crea una nueva!</p>
        </div>
        }
    </mat-card-content>
</mat-card>
