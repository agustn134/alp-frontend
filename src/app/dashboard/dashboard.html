<mat-toolbar class="monochrome-toolbar">
    <span>Notas Seguras</span>
    <span class="spacer"></span>
    <button mat-button class="monochrome-btn-outline" (click)="onLogout()">Cerrar Sesión</button>
</mat-toolbar>

<div class="dashboard-container">
    <mat-card class="monochrome-card">
        <mat-card-header>
            <mat-card-title>
                ¡Bienvenido, @if(user){ {{user.name}} }!
            </mat-card-title>
            <mat-card-subtitle>Has accedido satisfactoriamente</mat-card-subtitle>
        </mat-card-header>
        <mat-card-content>
            <p class="mt-3" style="margin-bottom: 5px;">Username: <strong>@if(user){ {{user.username}} }</strong></p>
            <p style="margin-top: 0;">Rol: <strong>@if(user){ {{user.role}} }</strong></p>
        </mat-card-content>
    </mat-card>

    <div class="section-wrapper">
        <app-task-list></app-task-list>
    </div>
    <div class="section-wrapper mt-4">
        <app-audit-logs></app-audit-logs>
    </div>
    @if (user?.role === 'ADMIN') {
    <div class="section-wrapper mt-4">
        <app-user-management></app-user-management>
    </div>
    }

</div>
