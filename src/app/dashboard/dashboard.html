<mat-toolbar color="primary">
    <span>Notas Seguras</span>
    <span class="spacer"></span>
    <button mat-button (click)="onLogout()">Cerrar Sesión</button>
</mat-toolbar>

<div class="dashboard-container">
    <mat-card>
        <mat-card-header>
            <mat-card-title>
                ¡Bienvenido, @if(user){ {{user.name}} {{user.lastname}} }!
            </mat-card-title>
            <mat-card-subtitle>Has accedido</mat-card-subtitle>
        </mat-card-header>
        <mat-card-content>
            <p class="mt-3">Tu usuario es: <strong>@if(user){ {{user.username}} }</strong></p>
            <p>El token se inyecta de manera segura gracias al Interceptor.</p>
        </mat-card-content>
    </mat-card>

    <div style="width: 100%; max-width: 800px;">
        <app-task-list></app-task-list>
    </div>
</div>
